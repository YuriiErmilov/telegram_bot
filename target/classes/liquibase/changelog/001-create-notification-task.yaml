databaseChangeLog:
  - changeSet:
      id: 1
      author: yurii

      changes:
        - createTable:
            tableName: notification_task

            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: notification_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false